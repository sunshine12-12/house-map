<script>
function initMap() {
  const map = new AMap.Map('container', {
    zoom: 13,
    center: [108.395, 22.830],
    mapStyle: 'amap://styles/normal'
  });

  let openInfo = null;

  HOUSES.forEach(h => {
    const color = COLORS[h.type] || '#888';
    const marker = new AMap.CircleMarker({
      center: [h.lon, h.lat],
      radius: 9,
      fillColor: color,
      fillOpacity: 0.9,
      strokeColor: '#fff',
      strokeWeight: 2,
      map: map,
      cursor: 'pointer'
    });

    let content = `<div class="info-window">
      <div class="info-title">${h.community}</div>
      <div class="info-type" style="color:${color}">${TYPE_LABEL[h.type]||h.type}</div>`;
    if (h.total_price) content += `💰 <b>${h.total_price}万</b>`;
    if (h.unit_price)  content += ` · ${h.unit_price}元/㎡`;
    if (h.rooms)       content += `<br>🏠 ${h.rooms}`;
    if (h.area)        content += ` ${h.area}㎡`;
    if (h.url)         content += `<br><a class="info-link" href="${h.url}" target="_blank">查看房源详情 →</a>`;
    content += '</div>';

    const infoWindow = new AMap.InfoWindow({
      content: content,
      offset: new AMap.Pixel(0, -12)
    });

    marker.on('click', () => {
      if (openInfo) openInfo.close();
      infoWindow.open(map, [h.lon, h.lat]);
      openInfo = infoWindow;
    });
  });
}
</script>
